name: Update COPR Spec Versions

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check upstreams and update specs
        run: |
          # Set up git right away
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          CHANGES_MADE=0

          # --- MODIFY THIS ARRAY ---
          # Format: "upstream_owner/upstream_repo|path/to/subdirectory/package.spec"
          TARGETS=(
          "InioX/matugen|matugen/matugen.spec"
          "GhostNaN/mpvpaper|mpvpaper/mpvpaper.spec"
          "nwg-piotr/nwg-clipman|nwg-clipman/nwg-clipman.spec"
          "nwg-piotr/nwg-look|nwg-look/nwg-look.spec"
          "hyprland-community/pyprland|pyprland/pyprland.spec"
          "imageio/imageio-ffmpeg|python-imageio-ffmpeg/python-imageio-ffmpeg.spec"
          "gabm/Satty|satty/satty.spec"
          "mortie/swaylock-effects|swaylock-effects/swaylock-effects.spec"
          "LGFae/swww|swww/swww.spec"
          "Vladimir-csp/uwsm|uwsm/uwsm.spec"
          "Alexays/Waybar|waybar-git/waybar-git.spec"
          "anufrievroman/waypaper|waypaper/waypaper.spec"
          "eworm-de/xcur2png|xcur2png/xcur2png.spec"
          "hyprwm/xdg-desktop-portal-hyprland|xdg-desktop-portal-hyprland/xdg-desktop-portal-hyprland.spec"
          "hyprwm/hyprlock|hyprlock/hyprlock.spec"
          "donovanglover/hyprnome|hyprnome/hyprnome.spec"
          "hyprwm/hyprpaper|hyprpaper/hyprpaper.spec"
          "hyprwm/hyprpicker|hyprpicker/hyprpicker.spec"
          "hyprwm/hyprpolkitagent|hyprpolkitagent/hyprpolkitagent.spec"
          "hyprwm/hyprpwcenter|hyprpwcenter/hyprpwcenter.spec"
          "hyprwm/hyprqt6engine|hyprqt6engine/hyprqt6engine.spec"
          "Gustash/Hyprshot|hyprshot/hyprshot.spec"
          "hyprwm/hyprshutdown|hyprshutdown/hyprshutdown.spec"
          "hyprwm/hyprsunset|hyprsunset/hyprsunset.spec"
          "hyprwm/hyprsysteminfo|hyprsysteminfo/hyprsysteminfo.spec"
          "hyprwm/hyprtoolkit|hyprtoolkit/hyprtoolkit.spec"
          "hyprwm/hyprutils|hyprutils/hyprutils.spec"
          "hyprwm/hyprwayland-scanner|hyprwayland-scanner/hyprwayland-scanner.spec"
          "hyprwm/hyprwire|hyprwire/hyprwire.spec"
          "google/material-design-icons|material-icons-fonts/material-icons-fonts.spec"
          "danihek/hellwal|hellwal/hellwal.spec"
          "hyprwm/hyprcursor|hyprcursor/hyprcursor.spec"
          "s0la1337/hyprdim|hyprdim/hyprdim.spec"
          "hyprwm/hyprgraphics|hyprgraphics/hyprgraphics.spec"
          "hyprwm/hypridle|hypridle/hypridle.spec"
          "flick0/hyprland-autoname-workspaces|hyprland-autoname-workspaces/hyprland-autoname-workspaces.spec"
          "hyprwm/contrib|hyprland-contrib/hyprland-contrib.spec"
          "hyprwm/Hyprland|hyprland-git/hyprland-git.spec"
          "hyprwm/hyprland-guiutils|hyprland-guiutils/hyprland-guiutils.spec"
          "hyprwm/hyprland-plugins|hyprland-plugins/hyprland-plugins.spec"
          "hyprwm/hyprland-protocols|hyprland-protocols/hyprland-protocols.spec"
          "hyprwm/hyprland-qt-support|hyprland-qt-support/hyprland-qt-support.spec"
          "hyprwm/hyprland-qtutils|hyprland-qtutils/hyprland-qtutils.spec"
          "hyprwm/hyprlang|hyprlang/hyprlang.spec"
          "hyprwm/hyprlauncher|hyprlauncher/hyprlauncher.spec"
          "hyprwm/aquamarine|aquamarine/aquamarine.spec"
          "Aylur/astal|astal/astal.spec"
          "Aylur/ags|aylurs-gtk-shell/aylurs-gtk-shell.spec"
          "sentriz/cliphist|cliphist/cliphist.spec"
          "elkowar/eww|eww-git/eww-git.spec"
          "stephenberry/glaze|glaze/glaze.spec"
          )

          # Loop through each target
          for TARGET in "${TARGETS[@]}"; do
            # Split the string by the '|' character
            IFS='|' read -r UPSTREAM_REPO SPEC_FILE <<< "$TARGET"
            
            echo "----------------------------------------"
            echo "Checking: $SPEC_FILE"
            
            # Check if the spec file actually exists in that subdirectory
            if [ ! -f "$SPEC_FILE" ]; then
              echo "⚠️  Warning: File $SPEC_FILE not found! Skipping..."
              continue
            fi

            # Fetch the latest release tag
            LATEST_TAG=$(curl -sL "https://api.github.com/repos/$UPSTREAM_REPO/releases/latest" | jq -r .tag_name)
            
            # Safety check for API limits or missing releases
            if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
              echo "⚠️  Warning: Could not fetch latest release for $UPSTREAM_REPO. Skipping..."
              continue
            fi

            LATEST_VERSION=${LATEST_TAG#v}
            CURRENT_VERSION=$(grep -E "^Version:\s+" "$SPEC_FILE" | awk '{print $2}')

            echo "Upstream Version: $LATEST_VERSION"
            echo "Current Version:  $CURRENT_VERSION"

            # Compare and update
            if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
              echo "🚀 New version detected! Updating $SPEC_FILE..."

              # Replace Version and reset Release
              sed -i "s/^Version:.*/Version:        $LATEST_VERSION/" "$SPEC_FILE"
              sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC_FILE"

              # Stage the changed file
              git add "$SPEC_FILE"
              CHANGES_MADE=1
            else
              echo "✅ Already up to date."
            fi
          done

          echo "----------------------------------------"

          # Commit and push if any files were changed
          if [ "$CHANGES_MADE" -eq 1 ]; then
            echo "Committing and pushing all updated spec files..."
            git commit -m "chore: auto-update spec file versions"
            
            # Pull any new remote changes (rebase) before pushing to avoid conflicts
            git pull --rebase origin master
            git push origin master
            
            echo "Successfully pushed updates."
          else
            echo "No updates needed across all spec files."
          fi
