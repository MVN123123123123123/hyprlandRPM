name: Check Qt6 Updates (Fedora Rawhide)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-qt6-rawhide:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Qt6 updates on Fedora Rawhide
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SPEC_FILE="quickshell-git/illogicall-impulse-ver/quickshell-git.spec"
          TRACKER_FILE="quickshell-git/illogicall-impulse-ver/.qt6-last-nvr-rawhide"

          if [ ! -f "$SPEC_FILE" ]; then
            echo "❌ Error: $SPEC_FILE not found!"
            exit 1
          fi

          echo "========================================"
          echo "Checking Qt6 updates on Fedora Rawhide"
          echo "========================================"

          # Rawhide packages don't go through Bodhi, so we query the Koji
          # build system via its XML-RPC API using Python's stdlib.
          LATEST_NVR=$(python3 - <<'PYEOF'
import xmlrpc.client

koji = xmlrpc.client.ServerProxy("https://koji.fedoraproject.org/kojihub")

# Try tags in order of likelihood for rawhide
tags = ["f45-updates-candidate", "f45", "f45-pending"]
nvr = None
for tag in tags:
    try:
        builds = koji.listTagged(tag, None, False, None, True, None, "qt6-qtbase")
        if builds:
            nvr = builds[0]["nvr"]
            break
    except Exception:
        continue

# Final fallback: getLatestBuilds
if not nvr:
    try:
        builds = koji.getLatestBuilds("f45-updates-candidate", None, "qt6-qtbase")
        if builds:
            nvr = builds[0]["nvr"]
    except Exception:
        pass

print(nvr or "")
PYEOF
          )

          echo "  Latest Rawhide NVR: $LATEST_NVR"

          if [ -z "$LATEST_NVR" ] || [ "$LATEST_NVR" = "null" ]; then
            echo "  ⚠️  Could not fetch Qt6 NVR from Koji. Skipping..."
            exit 0
          fi

          # Read the last known NVR
          LAST_NVR=""
          if [ -f "$TRACKER_FILE" ]; then
            LAST_NVR=$(cat "$TRACKER_FILE")
          fi

          echo "  Last known NVR:    $LAST_NVR"

          if [ "$LATEST_NVR" = "$LAST_NVR" ]; then
            echo "  ✅ No Qt6 update on Rawhide. Nothing to do."
            exit 0
          fi

          echo "  🚀 Qt6 update detected on Rawhide! Bumping release..."

          # Bump Release to force rebuild
          TIMESTAMP=$(date +%Y%m%d%H%M)
          sed -i -E "s/^Release:.*/Release:        $TIMESTAMP%{?dist}/" "$SPEC_FILE"

          # Save the new NVR
          echo "$LATEST_NVR" > "$TRACKER_FILE"

          git add "$SPEC_FILE" "$TRACKER_FILE"
          git commit -m "chore: rebuild quickshell-git for Qt6 update on Rawhide ($LATEST_NVR)"

          git pull --rebase origin master
          git push origin master

          echo "✅ Successfully pushed rebuild bump for Rawhide Qt6 update."
