name: Check Qt6 Updates (Fedora Rawhide)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-qt6-rawhide:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Qt6 NVR from Koji
        id: koji
        run: |
          # Rawhide packages bypass Bodhi — query Koji's XML-RPC API directly.
          # We ask for the 50 most recent completed builds of qt6-qtbase,
          # then pick the one with the highest .fcXX tag (i.e. Rawhide).
          LATEST_NVR=$(python3 - <<'PYEOF'
          import sys
          import re
          import xmlrpc.client

          KOJI_HUB = "https://koji.fedoraproject.org/kojihub"
          PACKAGE   = "qt6-qtbase"

          try:
              koji = xmlrpc.client.ServerProxy(KOJI_HUB)

              # xmlrpc.client only supports positional args, so pass
              # the package name as the first positional parameter.
              builds = koji.listBuilds(PACKAGE)

              # Filter to completed builds (state=1), then find the
              # highest .fcXX tag — that's the Rawhide build.
              best = None
              for b in builds:
                  if b.get("state") != 1:
                      continue
                  nvr = b.get("nvr", "")
                  m = re.search(r'\.fc(\d+)$', nvr)
                  if m:
                      fc_ver = int(m.group(1))
                      bid = b.get("build_id", 0)
                      if best is None or (fc_ver, bid) > (best[0], best[1]):
                          best = (fc_ver, bid, nvr)

              if best:
                  print(best[2])
              else:
                  print("::error::No completed .fcXX builds found", file=sys.stderr)
                  sys.exit(1)

          except xmlrpc.client.Fault as e:
              print(f"::error::Koji XML-RPC fault: {e.faultString}", file=sys.stderr)
              sys.exit(1)
          except Exception as e:
              print(f"::error::Unexpected error querying Koji: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )

          if [ -z "$LATEST_NVR" ]; then
            echo "::error::Python script returned empty NVR"
            exit 1
          fi

          echo "latest_nvr=$LATEST_NVR" >> "$GITHUB_OUTPUT"
          echo "  Latest Rawhide NVR: $LATEST_NVR"

      - name: Compare with last known NVR
        id: compare
        run: |
          TRACKER_FILE="quickshell-git/illogicall-impulse-ver/.qt6-last-nvr-rawhide"
          LATEST_NVR="${{ steps.koji.outputs.latest_nvr }}"

          LAST_NVR=""
          if [ -f "$TRACKER_FILE" ]; then
            LAST_NVR=$(cat "$TRACKER_FILE")
          fi

          echo "  Latest NVR:     $LATEST_NVR"
          echo "  Last known NVR: $LAST_NVR"

          if [ "$LATEST_NVR" = "$LAST_NVR" ]; then
            echo "  ✅ No Qt6 update on Rawhide. Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "  🚀 Qt6 update detected on Rawhide!"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump release and commit
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SPEC_FILE="quickshell-git/illogicall-impulse-ver/quickshell-git.spec"
          TRACKER_FILE="quickshell-git/illogicall-impulse-ver/.qt6-last-nvr-rawhide"
          LATEST_NVR="${{ steps.koji.outputs.latest_nvr }}"

          if [ ! -f "$SPEC_FILE" ]; then
            echo "::error::$SPEC_FILE not found"
            exit 1
          fi

          # Bump Release with a timestamp to force a rebuild
          TIMESTAMP=$(date +%Y%m%d%H%M)
          sed -i -E "s/^Release:.*/Release:        ${TIMESTAMP}%{?dist}/" "$SPEC_FILE"

          # Persist the new NVR so we don't bump again until the next update
          echo "$LATEST_NVR" > "$TRACKER_FILE"

          git add "$SPEC_FILE" "$TRACKER_FILE"
          git commit -m "chore: rebuild quickshell-git for Qt6 update on Rawhide ($LATEST_NVR)"

          # Push with retry in case of concurrent commits
          for attempt in 1 2 3; do
            git pull --rebase origin master && git push origin master && break
            echo "  ⚠️  Push attempt $attempt failed, retrying..."
            sleep 5
          done

          echo "✅ Successfully pushed rebuild bump for Rawhide Qt6 update."
