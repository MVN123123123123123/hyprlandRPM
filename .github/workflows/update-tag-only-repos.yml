name: Update Tag-Only Repo Spec Versions

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check upstreams and update specs
        run: |
          # Set up git right away
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          CHANGES_MADE=0

          # --- MODIFY THIS ARRAY ---
          # Format: "upstream_owner/upstream_repo|path/to/subdirectory/package.spec"
          # These are repos that use git tags instead of GitHub Releases.
          TARGETS=(
          "Vladimir-csp/uwsm|uwsm/uwsm.spec"
          "jirutka/swaylock-effects|swaylock-effects/swaylock-effects.spec"
          )

          # Loop through each target
          for TARGET in "${TARGETS[@]}"; do
            # Split the string by the '|' character
            IFS='|' read -r UPSTREAM_REPO SPEC_FILE <<< "$TARGET"
            
            echo "----------------------------------------"
            echo "Checking: $SPEC_FILE"
            
            # Check if the spec file actually exists in that subdirectory
            if [ ! -f "$SPEC_FILE" ]; then
              echo "⚠️  Warning: File $SPEC_FILE not found! Skipping..."
              continue
            fi

            # Fetch tags from the GitHub API (returns newest first)
            ALL_TAGS=$(curl -sL "https://api.github.com/repos/$UPSTREAM_REPO/tags?per_page=30" | jq -r '.[].name')
            
            # Safety check for API limits or missing tags
            if [ -z "$ALL_TAGS" ]; then
              echo "⚠️  Warning: Could not fetch tags for $UPSTREAM_REPO. Skipping..."
              continue
            fi

            # Filter to only clean version tags: match vX.Y.Z or X.Y.Z patterns
            # Skip pre-release tags (rc, alpha, beta, dev) and suffixed tags (+git.1, etc.)
            LATEST_TAG=""
            while IFS= read -r TAG; do
              # Strip leading 'v' for matching
              CLEAN=${TAG#v}
              # Only accept tags that look like clean semver: digits and dots only
              if [[ "$CLEAN" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
                LATEST_TAG="$TAG"
                break
              fi
            done <<< "$ALL_TAGS"

            if [ -z "$LATEST_TAG" ]; then
              echo "⚠️  Warning: No clean version tag found for $UPSTREAM_REPO. Skipping..."
              continue
            fi

            LATEST_VERSION=${LATEST_TAG#v}
            CURRENT_VERSION=$(grep -E "^Version:\s+" "$SPEC_FILE" | awk '{print $2}')

            echo "Latest Tag:       $LATEST_TAG"
            echo "Upstream Version: $LATEST_VERSION"
            echo "Current Version:  $CURRENT_VERSION"

            # Compare and update
            if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
              echo "🚀 New version detected! Updating $SPEC_FILE..."

              # Replace Version and reset Release
              sed -i "s/^Version:.*/Version:        $LATEST_VERSION/" "$SPEC_FILE"
              sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC_FILE"

              # Stage the changed file
              git add "$SPEC_FILE"
              CHANGES_MADE=1
            else
              echo "✅ Already up to date."
            fi
          done

          echo "----------------------------------------"

          # Commit and push if any files were changed
          if [ "$CHANGES_MADE" -eq 1 ]; then
            echo "Committing and pushing all updated spec files..."
            git commit -m "chore: auto-update spec file versions (tag-only repos)"
            
            # Pull any new remote changes (rebase) before pushing to avoid conflicts
            git pull --rebase origin master
            git push origin master
            
            echo "Successfully pushed updates."
          else
            echo "No updates needed across all spec files."
          fi
