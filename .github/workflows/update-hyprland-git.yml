name: Update hyprland-git Spec Commits

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check upstreams and update hyprland-git spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SPEC_FILE="hyprland-git/hyprland-git.spec"
          CHANGES_MADE=0

          if [ ! -f "$SPEC_FILE" ]; then
            echo "❌ Error: $SPEC_FILE not found!"
            exit 1
          fi

          echo "========================================"
          echo "Checking hyprland-git spec file commits"
          echo "========================================"

          # --- 1. Hyprland main commit (hyprwm/Hyprland) ---
          echo ""
          echo "--- [1/3] hyprwm/Hyprland ---"
          LATEST_HYPRLAND=$(curl -sL "https://api.github.com/repos/hyprwm/Hyprland/commits" | jq -r '.[0].sha')
          CURRENT_HYPRLAND=$(grep -E "^%global\s+hyprland_commit\s+" "$SPEC_FILE" | awk '{print $3}')

          echo "  Upstream: $LATEST_HYPRLAND"
          echo "  Current:  $CURRENT_HYPRLAND"

          if [ "$LATEST_HYPRLAND" == "null" ] || [ -z "$LATEST_HYPRLAND" ]; then
            echo "  ⚠️  Could not fetch latest commit for hyprwm/Hyprland. Skipping..."
          elif [ "$LATEST_HYPRLAND" != "$CURRENT_HYPRLAND" ] && [ -n "$CURRENT_HYPRLAND" ]; then
            echo "  🚀 New commit detected! Updating hyprland_commit..."
            sed -i "s/^%global hyprland_commit.*/%global hyprland_commit $LATEST_HYPRLAND/" "$SPEC_FILE"
            CHANGES_MADE=1
          else
            echo "  ✅ Already up to date."
          fi

          # --- 2. hyprland-protocols commit (hyprwm/hyprland-protocols) ---
          echo ""
          echo "--- [2/3] hyprwm/hyprland-protocols ---"
          LATEST_PROTOCOLS=$(curl -sL "https://api.github.com/repos/hyprwm/hyprland-protocols/commits" | jq -r '.[0].sha')
          CURRENT_PROTOCOLS=$(grep -E "^%global\s+protocols_commit\s+" "$SPEC_FILE" | awk '{print $3}')

          echo "  Upstream: $LATEST_PROTOCOLS"
          echo "  Current:  $CURRENT_PROTOCOLS"

          if [ "$LATEST_PROTOCOLS" == "null" ] || [ -z "$LATEST_PROTOCOLS" ]; then
            echo "  ⚠️  Could not fetch latest commit for hyprwm/hyprland-protocols. Skipping..."
          elif [ "$LATEST_PROTOCOLS" != "$CURRENT_PROTOCOLS" ] && [ -n "$CURRENT_PROTOCOLS" ]; then
            echo "  🚀 New commit detected! Updating protocols_commit..."
            sed -i "s/^%global protocols_commit.*/%global protocols_commit $LATEST_PROTOCOLS/" "$SPEC_FILE"
            CHANGES_MADE=1
          else
            echo "  ✅ Already up to date."
          fi

          # --- 3. udis86 commit (canihavesomecoffee/udis86) ---
          echo ""
          echo "--- [3/3] canihavesomecoffee/udis86 ---"
          LATEST_UDIS86=$(curl -sL "https://api.github.com/repos/canihavesomecoffee/udis86/commits" | jq -r '.[0].sha')
          CURRENT_UDIS86=$(grep -E "^%global\s+udis86_commit\s+" "$SPEC_FILE" | awk '{print $3}')

          echo "  Upstream: $LATEST_UDIS86"
          echo "  Current:  $CURRENT_UDIS86"

          if [ "$LATEST_UDIS86" == "null" ] || [ -z "$LATEST_UDIS86" ]; then
            echo "  ⚠️  Could not fetch latest commit for canihavesomecoffee/udis86. Skipping..."
          elif [ "$LATEST_UDIS86" != "$CURRENT_UDIS86" ] && [ -n "$CURRENT_UDIS86" ]; then
            echo "  🚀 New commit detected! Updating udis86_commit..."
            sed -i "s/^%global udis86_commit.*/%global udis86_commit $LATEST_UDIS86/" "$SPEC_FILE"
            CHANGES_MADE=1
          else
            echo "  ✅ Already up to date."
          fi

          echo ""
          echo "========================================"

          # Reset Release if any changes were made
          if [ "$CHANGES_MADE" -eq 1 ]; then
            sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC_FILE"

            git add "$SPEC_FILE"
            echo "Committing and pushing updated hyprland-git spec..."
            git commit -m "chore: auto-update hyprland-git spec commits"

            git pull --rebase origin master
            git push origin master

            echo "✅ Successfully pushed updates."
          else
            echo "No updates needed for hyprland-git."
          fi

          echo "CHANGES_MADE=$CHANGES_MADE" >> "$GITHUB_ENV"

      - name: Trigger full dependency chain rebuild
        if: env.CHANGES_MADE == '1'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering rebuild-deps workflow from tier 1 (full rebuild)');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rebuild-deps.yml',
              ref: 'master',
              inputs: {
                rebuild_from: '1'
              }
            });
